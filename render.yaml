services:
  # Backend Python Flask API
  - type: web
    name: ctda-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PORT
        value: 5000
    rootDir: backend

  # Frontend static React site
  - type: static
    name: ctda-frontend
    buildCommand: npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ctda-backend
          property: host
    rootDir: frontend/ctda
